<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デリシャス・スタディ V6</title>
    <style>
        :root {
            --main-food: #ffb347; --bg-vanilla: #fff9f0; --text-choco: #5d4037;
            --btn-green: #8bc34a; --btn-red: #ef5350; --study-orange: #fb8c00;
        }
        
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; margin: 0; background: var(--bg-vanilla); color: var(--text-choco); overflow: hidden; }
        
        /* ヘッダー */
        .header { background: var(--main-food); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; height: 60px; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.2rem; margin: 0; flex-grow: 1; text-align: center; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .menu-btn, .plus-btn { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }

        /* サイドメニュー */
        .side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: white; z-index: 3000; transition: 0.3s ease-out; padding-top: 60px; }
        .side-menu.open { left: 0; }
        .menu-item { width: 100%; padding: 18px 20px; border: none; background: none; text-align: left; font-size: 1rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .menu-item.active { background: #fff0db; color: var(--main-food); font-weight: bold; border-left: 5px solid var(--main-food); }

        .content { margin-top: 60px; height: calc(100vh - 60px); position: relative; }
        section { display: none; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; padding-bottom: 100px; }
        section.active { display: block; }

        /* お部屋背景 & お散歩キャラ */
        #room-stage { width: 100%; height: 250px; background: #fff; border-radius: 20px; position: relative; overflow: hidden; border: 4px solid #f8e1c1; background-image: radial-gradient(#fdf5e6 20%, transparent 20%), radial-gradient(#fdf5e6 20%, transparent 20%); background-size: 40px 40px; background-position: 0 0, 20px 20px; }
        #room-char { font-size: 5rem; position: absolute; bottom: 20px; left: 50%; transition: left 3s linear, transform 0.2s; cursor: pointer; z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .face { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -10%); font-size: 1.2rem; pointer-events: none; }
        .bubble { position: absolute; background: white; border: 2px solid var(--main-food); border-radius: 15px; padding: 8px 12px; font-size: 0.8rem; bottom: 110px; left: 50%; transform: translateX(-50%); white-space: nowrap; z-index: 20; opacity: 0; transition: opacity 0.5s; }
        .bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: var(--main-food) transparent; }

        /* カードデザイン & 長押し用アニメ */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; transition: transform 0.1s; user-select: none; }
        .card:active { transform: scale(0.98); }
        .vibrate { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } 100% { transform: rotate(0deg); } }

        /* タイマー（ドラムロール風） */
        .picker-container { display: flex; align-items: center; justify-content: center; gap: 10px; background: #eee; padding: 10px; border-radius: 10px; }
        .picker { height: 100px; overflow-y: scroll; scroll-snap-type: y mandatory; width: 60px; text-align: center; }
        .picker div { height: 33px; scroll-snap-align: center; line-height: 33px; font-size: 1.2rem; }

        /* 共通ボタン */
        .btn-orange { background: var(--main-food); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-right: 5px; color: white; }
        
        /* 削除メニュー */
        .delete-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(239,83,80,0.9); color: white; display: none; align-items: center; justify-content: center; border-radius: 15px; z-index: 100; font-weight: bold; }

        /* ふりかけ */
        .sparkle { position: fixed; pointer-events: none; z-index: 5000; animation: fall 1.5s forwards; }
        @keyframes fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h1 id="title">お部屋</h1>
    <button class="plus-btn" id="header-plus" onclick="openPlanModal()" style="visibility: hidden;">＋</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="side-menu" id="side-menu">
    <button class="menu-item active" onclick="showPage('room', 'お部屋')">🏠 お部屋</button>
    <button class="menu-item" onclick="showPage('timer', '予定')">⏱ 予定</button>
    <button class="menu-item" onclick="showPage('todo', 'Todo')">📝 Todo</button>
    <button class="menu-item" onclick="showPage('habit', '習慣')">✨ 習慣</button>
    <button class="menu-item" onclick="showPage('reading', '読書')">📖 読書</button>
</nav>

<div class="content">
    <section id="room" class="active">
        <div id="room-stage">
            <div id="talk-bubble" class="bubble">こんにちは！</div>
            <div id="room-char" onclick="petChar()" oncontextmenu="return false;">
                <span id="char-emoji">🥚</span>
                <div class="face" id="char-face">^ ^</div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-orange" onclick="openMeigenModal()" style="flex:1;">名言箱 🎁</button>
            <div style="flex:1; background:white; padding:10px; border-radius:10px; font-size:0.8rem; border-left:4px solid var(--main-food);">
                <small>今日のごちそう</small>
                <div id="meigen-display">一歩ずつ完食！</div>
            </div>
        </div>
        <div class="card" style="margin-top:15px;">
            <h4 style="margin:0 0 10px; font-size:0.9rem;">本日の完食リスト</h4>
            <div id="meal-log"></div>
        </div>
    </section>

    <section id="timer">
        <div id="timeline-wrapper" style="position:relative; background:white; min-height:100%;">
            <div id="current-bar" style="position:absolute; left:50px; right:0; height:3px; background:red; z-index:10;"></div>
            <div id="plan-container"></div>
            <div id="block-container"></div>
        </div>
    </section>

    <section id="todo">
        <div class="card">
            <input type="text" id="todo-input" placeholder="なにを食べる？（タスク）">
            <div style="display:flex; gap:5px; margin:5px 0;">
                <select id="todo-tag" style="flex:1;"><option value="動く">🏃 動く</option><option value="書く">✏️ 書く</option><option value="読む">📖 読む</option><option value="写す">📑 写す</option></select>
                <select id="todo-size" style="flex:1;"><option value="15">おつまみ(15分)</option><option value="30">軽食(30分)</option><option value="60">定食(60分)</option><option value="90">フルコース(90分)</option></select>
            </div>
            <button class="btn-orange" onclick="addTodo()">注文する</button>
        </div>
        <div id="todo-list"></div>
    </section>

    <section id="habit">
        <div style="text-align:center; padding:15px; margin-bottom:15px; background:white; border-radius:15px; border:3px solid var(--main-food);">
            <small>満腹ポイント</small><br><span id="score-display" style="font-size:2rem; font-weight:bold;">0 pt</span>
        </div>
        <div class="card"><input type="text" id="habit-input" placeholder="毎日のおかわりメニュー"><button class="btn-orange" onclick="addNewHabit()" style="margin-top:5px;">習慣を追加</button></div>
        <div id="habit-list"></div>
    </section>

    <section id="reading">
        <div class="card" style="background:#f1f8e9;">
            <strong>📚 今年のフルコース: <span id="year-books">0</span>冊</strong>
            <input type="text" id="book-search" placeholder="本をさがす..." oninput="renderBooks()" style="margin-top:10px;">
            <div id="search-count" style="font-size:0.8rem; color:#666; margin-top:5px;"></div>
        </div>
        <div class="card">
            <input type="text" id="bk-title" placeholder="本の名まえ">
            <div style="display:flex; gap:5px;"><input type="text" id="bk-author" placeholder="作者" style="flex:1;"><input type="text" id="bk-pub" placeholder="出版社" style="flex:1;"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="bk-year" placeholder="発行年" style="flex:1;"><select id="bk-genre" style="flex:1;"><option>小説</option><option>実用書</option><option>漫画</option></select></div>
            <button class="btn-orange" onclick="addBook()" style="background:#88d8b0; margin-top:10px;">本棚へ</button>
        </div>
        <div id="book-list"></div>
    </section>
</div>

<div class="modal" id="plan-modal">
    <div class="modal-content">
        <h3>予定の予約</h3>
        <input type="text" id="p-name" placeholder="予定の名まえ">
        <div style="display:flex; justify-content:center; align-items:center; gap:5px; margin:15px 0;">
            <div class="picker" id="p-hour-picker"></div>時
            <div class="picker" id="p-min-picker"></div>分から
        </div>
        <select id="p-dur"><option value="30">30分間</option><option value="60">1時間</option><option value="120">2時間</option></select>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-orange" onclick="savePlan()">保存</button>
            <button onclick="closeModal('plan-modal')" style="flex:1; border:none; background:#eee; border-radius:8px;">閉じる</button>
        </div>
    </div>
</div>

<div class="modal" id="meigen-modal">
    <div class="modal-content" style="max-height:80vh; overflow-y:auto;">
        <h3>名言箱 🎁</h3>
        <input type="text" id="new-meigen" placeholder="新しい名言を追加...">
        <button class="btn-orange" onclick="addMeigen()" style="margin-bottom:15px;">追加</button>
        <div id="meigen-list"></div>
        <button onclick="closeModal('meigen-modal')" style="width:100%; border:none; background:#eee; padding:10px; margin-top:10px; border-radius:8px;">閉じる</button>
    </div>
</div>

<script>
    const getDB = (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d));
    const setDB = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    let longPressTimer;
    let walkInterval;

    window.onload = () => {
        initPickers(); initTimeline(); renderAll(); 
        setInterval(updateTimeBar, 60000); updateTimeBar();
        startWalking();
        setInterval(autoTalk, 8000);
    };

    function showPage(p, t) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('title').innerText = t;
        document.getElementById('header-plus').style.visibility = (p === 'timer') ? 'visible' : 'hidden';
        document.querySelector(`[onclick*="${p}"]`).classList.add('active');
        toggleMenu(false);
    }

    function toggleMenu(force) {
        const m = document.getElementById('side-menu');
        const o = document.getElementById('overlay');
        if(force === false) { m.classList.remove('open'); o.classList.remove('active'); }
        else { m.classList.toggle('open'); o.classList.toggle('active'); }
    }

    // お散歩 & おしゃべり
    function startWalking() {
        const char = document.getElementById('room-char');
        walkInterval = setInterval(() => {
            const pos = Math.random() * 70 + 5;
            char.style.left = pos + "%";
        }, 5000);
    }

    function autoTalk() {
        const b = document.getElementById('talk-bubble');
        const msgs = getDB('myMeigens', ["お腹すいたな〜", "今日のご飯は何？", "勉強のあとのデザートは最高！"]);
        b.innerText = msgs[Math.floor(Math.random()*msgs.length)];
        b.style.opacity = 1;
        setTimeout(() => b.style.opacity = 0, 4000);
    }

    function petChar() {
        const f = document.getElementById('char-face');
        f.innerText = "❤️"; setTimeout(() => f.innerText = "^ ^", 1000);
        createSparkles();
    }

    // 長押し削除システム
    function enableLongPress(el, type, index) {
        const del = document.createElement('div');
        del.className = 'delete-overlay';
        del.innerText = '下げる？（削除）';
        el.appendChild(del);

        el.ontouchstart = () => {
            longPressTimer = setTimeout(() => {
                el.classList.add('vibrate');
                del.style.display = 'flex';
                del.onclick = (e) => { e.stopPropagation(); deleteItem(type, index); };
            }, 800);
        };
        el.ontouchend = () => { clearTimeout(longPressTimer); };
        // PC用
        el.onmousedown = el.ontouchstart; el.onmouseup = el.ontouchend;
    }

    function deleteItem(type, index) {
        const keys = { 'todo':'myTodos', 'habit':'myHabitList', 'book':'myBooks', 'plan':'fixedPlans' };
        let data = getDB(keys[type], []);
        data.splice(index, 1);
        setDB(keys[type], data);
        renderAll();
    }

    // ドラムロール初期化
    function initPickers() {
        const h = document.getElementById('p-hour-picker');
        const m = document.getElementById('p-min-picker');
        for(let i=0; i<24; i++) h.innerHTML += `<div>${String(i).padStart(2,'0')}</div>`;
        for(let i=0; i<60; i+=5) m.innerHTML += `<div>${String(i).padStart(2,'0')}</div>`;
    }

    // 予定
    function savePlan() {
        const h = Math.round(document.getElementById('p-hour-picker').scrollTop / 33);
        const m = Math.round(document.getElementById('p-min-picker').scrollTop / 33) * 5;
        const dur = parseInt(document.getElementById('p-dur').value);
        const start = h * 60 + m;
        const plans = getDB('fixedPlans', []);
        plans.push({ title: document.getElementById('p-name').value || "無題の予定", start, end: start+dur, color: "#ffe0b2" });
        setDB('fixedPlans', plans);
        closeModal('plan-modal'); renderAll();
    }

    function initTimeline() {
        const w = document.getElementById('timeline-wrapper');
        w.innerHTML = '<div id="current-bar" class="current-time-bar"></div><div id="plan-container"></div><div id="block-container"></div>';
        for(let i=0; i<24; i++) w.innerHTML += `<div class="time-row"><div class="time-label">${i}:00</div><div style="flex:1; border-left:3px solid #ffe0b2;"></div></div>`;
    }

    // Todo
    function addTodo() {
        const title = document.getElementById('todo-input').value; if(!title) return;
        const todos = getDB('myTodos', []);
        todos.push({ title, tag: document.getElementById('todo-tag').value, time: document.getElementById('todo-size').value });
        setDB('myTodos', todos); renderAll();
    }

    function renderTodos() {
        const todos = getDB('myTodos', []);
        const tagColors = { "動く":"#ff8a65", "書く":"#4db6ac", "読む":"#7986cb", "写す":"#9575cd" };
        document.getElementById('todo-list').innerHTML = todos.map((t, i) => {
            const el = document.createElement('div'); el.className = 'card';
            el.innerHTML = `<span class="tag" style="background:${tagColors[t.tag]}">${t.tag}</span> <strong>${t.title}</strong> (${t.time}分)`;
            const btnWrap = document.createElement('div'); btnWrap.style.marginTop = "10px";
            btnWrap.innerHTML = `<button class="btn-green" onclick="startFocus(${i})">味見</button> <button class="btn-red" onclick="finishTodo(${i})" style="margin-left:5px;">完食！</button>`;
            el.appendChild(btnWrap);
            enableLongPress(el, 'todo', i);
            return el.outerHTML;
        }).join('');
    }

    function finishTodo(i) {
        const todos = getDB('myTodos', []);
        const logs = getDB('mealLogs', []);
        logs.unshift(`🍽 ${todos[i].title}を完食！`);
        setDB('mealLogs', logs.slice(0, 5));
        todos.splice(i, 1); setDB('myTodos', todos); renderAll();
    }

    // 読書 (検索付き)
    function addBook() {
        const b = getDB('myBooks', []);
        b.push({ title: document.getElementById('bk-title').value, author: document.getElementById('bk-author').value, pub: document.getElementById('bk-pub').value, year: document.getElementById('bk-year').value, genre: document.getElementById('bk-genre').value });
        setDB('myBooks', b); renderAll();
    }

    function renderBooks() {
        const query = document.getElementById('book-search').value;
        const books = getDB('myBooks', []);
        const filtered = books.filter(b => b.title.includes(query));
        document.getElementById('search-count').innerText = query ? `${filtered.length}冊見つかったよ！` : "";
        document.getElementById('year-books').innerText = books.length;
        document.getElementById('book-list').innerHTML = filtered.map((b, i) => {
            const el = document.createElement('div'); el.className = 'card';
            el.innerHTML = `<strong>${b.title}</strong><br><small>${b.author} / ${b.pub} (${b.year})</small>`;
            el.onclick = () => alert(`詳細：${b.genre}`);
            enableLongPress(el, 'book', i);
            return el.outerHTML;
        }).join('');
    }

    // 名言機能
    function openMeigenModal() {
        document.getElementById('meigen-modal').style.display = 'flex';
        renderMeigens();
    }
    function addMeigen() {
        const val = document.getElementById('new-meigen').value; if(!val) return;
        const m = getDB('myMeigens', []); m.push(val); setDB('myMeigens', m);
        document.getElementById('new-meigen').value = ''; renderMeigens();
    }
    function renderMeigens() {
        const m = getDB('myMeigens', []);
        document.getElementById('meigen-list').innerHTML = m.map((txt, i) => `<div class="log-item">${txt}</div>`).join('');
    }

    // 共通・その他
    function updateScore(p) {
        let s = getDB('myTotalScore', 0); s += p; setDB('myTotalScore', Math.max(0, s));
        renderAll();
    }
    function addNewHabit() {
        const h = getDB('myHabitList', []); h.push(document.getElementById('habit-input').value);
        setDB('myHabitList', h); renderAll();
    }
    function renderHabits() {
        const h = getDB('myHabitList', []);
        document.getElementById('habit-list').innerHTML = h.map((name, i) => {
            const el = document.createElement('div'); el.className = 'card';
            el.style.display = 'flex'; el.style.justifyContent = 'space-between';
            el.innerHTML = `<span>${name}</span><div><button onclick="updateScore(10)">🍴</button></div>`;
            enableLongPress(el, 'habit', i);
            return el.outerHTML;
        }).join('');
    }
    function createSparkles() {
        for(let i=0; i<10; i++) {
            const s = document.createElement('div'); s.className = 'sparkle'; s.innerText = '✨';
            s.style.left = Math.random()*100 + "vw"; s.style.top = "50vh"; document.body.appendChild(s);
            setTimeout(() => s.remove(), 1500);
        }
    }
    function updateTimeBar() { document.getElementById('current-bar').style.top = (new Date().getHours()*60 + new Date().getMinutes()) + "px"; }
    function scrollToNow() { document.getElementById('timer').scrollTop = (new Date().getHours()*60) - 100; }
    function openPlanModal() { document.getElementById('plan-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function renderBlocks() {
        const p = getDB('fixedPlans', []);
        document.getElementById('plan-container').innerHTML = p.map(x => `<div class="plan-block" style="top:${x.start}px; height:${x.end-x.start}px; background:${x.color}">${x.title}</div>`).join('');
    }

    function renderAll() {
        renderTodos(); renderHabits(); renderBooks(); renderLogs();
        document.getElementById('score-display').innerText = getDB('myTotalScore', 0) + " pt";
        document.getElementById('meigen-display').innerText = getDB('myMeigens', ["一歩ずつ完食！"])[0];
        updateChar(); renderBlocks();
    }
    function renderLogs() {
        const l = getDB('mealLogs', []);
        document.getElementById('meal-log').innerHTML = l.map(x => `<div class="log-item">${x}</div>`).join('');
    }
    function updateChar() {
        const s = getDB('myTotalScore', 0); const e = document.getElementById('char-emoji'); const r = document.getElementById('rank-display');
        let em = "🥚"; if(s>=1000) em="🎂"; else if(s>=500) em="🍖"; else if(s>=300) em="🍱"; else if(s>=150) em="🍛"; else if(s>=50) em="🍳";
        e.innerText = em;
    }
</script>

</body>
</html>
