<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デリシャス・スタディ V5</title>
    <style>
        :root {
            --main-food: #ffb347;
            --bg-vanilla: #fff9f0;
            --text-choco: #5d4037;
            --btn-green: #8bc34a;
            --btn-red: #ef5350;
            --study-orange: #fb8c00;
        }
        
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; margin: 0; background: var(--bg-vanilla); color: var(--text-choco); overflow: hidden; }
        
        /* ヘッダー：白文字を絶対に見やすく！ */
        .header { background: var(--main-food); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; height: 60px; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; margin: 0; flex-grow: 1; text-align: center; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); letter-spacing: 1px; }
        .menu-btn, .plus-btn { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; z-index: 2001; }

        /* サイドメニュー */
        .side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: white; z-index: 3000; transition: 0.3s ease-out; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .side-menu.open { left: 0; }
        .menu-item { width: 100%; padding: 18px 20px; border: none; background: none; text-align: left; font-size: 1rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; color: var(--text-choco); }
        .menu-item.active { background: #fff0db; color: var(--main-food); font-weight: bold; border-left: 5px solid var(--main-food); }

        .content { margin-top: 60px; height: calc(100vh - 60px); position: relative; }
        section { display: none; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; padding-bottom: 100px; }
        section.active { display: block; }

        /* キラキラふりかけエフェクト用 */
        .sparkle { position: fixed; pointer-events: none; z-index: 5000; font-size: 20px; animation: fall 1.5s ease-out forwards; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
        }

        /* キャラ・料理 */
        #room-char-container { text-align: center; margin-top: 20px; position: relative; }
        #room-char { font-size: 7rem; cursor: pointer; display: inline-block; transition: transform 0.2s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .face { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -10%); font-size: 1.4rem; font-family: cursive; pointer-events: none; color: rgba(0,0,0,0.7); }
        .room-bubble { background: white; border: 3px solid var(--main-food); border-radius: 20px; padding: 12px; margin-bottom: 25px; font-size: 0.95rem; text-align: center; position: relative; }

        /* 予定・タイムテーブル */
        #timer { padding: 0; background: #fff; }
        .timeline-wrapper { position: relative; width: 100%; padding-bottom: 500px; }
        .time-row { display: flex; border-bottom: 1px solid #eee; height: 60px; }
        .time-label { width: 50px; text-align: right; padding-right: 10px; font-size: 0.7rem; color: #999; line-height: 20px; }
        .plan-block { position: absolute; left: 50px; right: 0; opacity: 0.5; z-index: 1; padding: 5px; font-size: 0.7rem; border-left: 4px solid rgba(0,0,0,0.1); border-radius: 0 10px 10px 0; }
        .study-block { position: absolute; left: 60px; right: 10px; border-radius: 8px; opacity: 0.95; z-index: 5; padding: 8px; font-size: 0.8rem; color: white; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        .current-time-bar { position: absolute; left: 50px; right: 0; height: 3px; background: #ef5350; z-index: 10; }

        /* カードデザイン */
        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-orange { background: var(--main-food); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-green { background: var(--btn-green); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .btn-red { background: var(--btn-red); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 420px; }
        input, select { width: 100%; padding: 12px; margin: 6px 0; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }
        
        .log-item { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #eee; color: #795548; }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h1 id="title">お部屋</h1>
    <button class="plus-btn" id="header-plus" onclick="openPlanModal()" style="visibility: hidden;">＋</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="side-menu" id="side-menu">
    <button class="menu-item active" onclick="showPage('room', 'お部屋')">🏠 お部屋</button>
    <button class="menu-item" onclick="showPage('timer', '予定')">⏱ 予定</button>
    <button class="menu-item" onclick="showPage('todo', 'Todo')">📝 Todo</button>
    <button class="menu-item" onclick="showPage('habit', '習慣')">✨ 習慣</button>
    <button class="menu-item" onclick="showPage('reading', '読書')">📖 読書</button>
</nav>

<div class="content">
    <section id="room" class="active">
        <div class="room-bubble" id="talk-bubble">なでると味見できるよ！</div>
        <div id="room-char-container">
            <div id="room-char" onclick="petChar()">
                <span id="char-emoji">🥚</span>
                <div class="face" id="char-face">^ ^</div>
            </div>
            <div id="rank-display" style="margin-top:10px; font-weight:bold; color:var(--main-food); font-size:1.1rem;">メニュー: 生たまご</div>
        </div>
        
        <div class="card" style="margin-top: 30px; border-left: 5px solid var(--main-food);">
            <small style="color:var(--main-food); font-weight:bold;">今日のごちそう言葉</small>
            <div id="meigen-area" style="font-style: italic; margin-top: 5px;"></div>
        </div>

        <div class="card">
            <h4 style="margin:0 0 10px; color:var(--main-food); font-size:0.9rem;">本日の完食リスト（献立ログ）</h4>
            <div id="meal-log"></div>
        </div>
    </section>

    <section id="timer">
        <div class="timeline-wrapper" id="timeline-wrapper">
            <div id="current-bar" class="current-time-bar"></div>
            <div id="plan-container"></div>
            <div id="block-container"></div>
        </div>
        <button onclick="clearAllSchedules()" style="width:90%; margin:20px 5%; padding:10px; color:var(--btn-red); border:2px solid var(--btn-red); background:none; border-radius:10px; font-weight:bold;">予定を全部リセット</button>
    </section>

    <section id="todo">
        <div class="card">
            <h4 style="margin:0 0 10px; color:var(--main-food);">今日の注文</h4>
            <input type="text" id="todo-input" placeholder="タスク名（料理名）">
            <input type="number" id="todo-time" placeholder="予定時間（分）">
            <button class="btn-orange" onclick="addTodo()">注文する</button>
        </div>
        <div id="todo-list"></div>
    </section>

    <section id="habit">
        <div style="text-align:center; padding:20px; background:white; border-radius:18px; border:3px solid var(--main-food); margin-bottom:20px;">
            <div style="font-size:0.9rem; color:#8d6e63;">現在の満腹度</div>
            <span id="score-display" style="font-size:2.2rem; font-weight:bold; color:var(--main-food);">0 pt</span>
        </div>
        <div class="card">
            <input type="text" id="habit-name-input" placeholder="新しい習慣">
            <button class="btn-orange" onclick="addNewHabit()" style="margin-top:8px;">習慣を追加</button>
        </div>
        <div id="habit-list"></div>
    </section>

    <section id="reading">
        <div class="card" style="border: 2px solid #88d8b0; background:#f1f8e9;">
            <strong>📚 今年のフルコース: <span id="year-books">0</span>冊</strong>
            <div id="genre-stats" style="font-size: 0.85rem; color: #666; margin-top: 6px;"></div>
        </div>
        <div class="card">
            <h4 style="margin:0 0 10px; color:#88d8b0;">新しい本を登録</h4>
            <input type="text" id="bk-title" placeholder="タイトル（必須）">
            <input type="text" id="bk-author" placeholder="作者名">
            <input type="text" id="bk-pub" placeholder="発行所">
            <input type="text" id="bk-year" placeholder="発行年">
            <select id="bk-genre"><option value="小説">小説</option><option value="実用書">実用書</option><option value="漫画">漫画</option><option value="その他">その他</option></select>
            <div style="display:flex; gap:8px;">
                <input type="number" id="bk-pages" placeholder="全ページ">
                <input type="date" id="bk-date">
            </div>
            <button class="btn-orange" onclick="addBook()" style="background:#88d8b0; margin-top:10px;">本を追加</button>
        </div>
        <div id="book-list"></div>
    </section>
</div>

<div class="modal" id="plan-modal">
    <div class="modal-content">
        <h3>新しい予定を追加</h3>
        <input type="text" id="p-name" placeholder="予定名">
        <input type="number" id="p-start" placeholder="開始(0-23)">
        <input type="number" id="p-end" placeholder="終了(0-23)">
        <select id="p-color">
            <option value="#ffe0b2">オレンジ（杏子）</option>
            <option value="#bbdefb">ブルー（ソーダ）</option>
            <option value="#c8e6c9">グリーン（メロン）</option>
        </select>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn-orange" onclick="savePlan()" style="flex:1;">保存</button>
            <button onclick="closePlanModal()" style="flex:1; background:#eee; border:none; border-radius:10px;">閉じる</button>
        </div>
    </div>
</div>

<script>
    const getDB = (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d));
    const setDB = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    const foodMeigens = ["勉強は別腹。", "知識は人生のフルコース。", "努力はおいしいスパイス。", "集中という名のメインディッシュ。"];
    const faces = ["^ ^", "O O", "u u", "* *", "> <"];
    const sprinkleIcons = ["✨", "🍭", "🍰", "⭐", "🍳", "🍗"];

    let lastRank = "";

    window.onload = () => {
        initTimeline(); 
        renderAll();
        setInterval(updateTimeBar, 60000);
        updateTimeBar();
        lastRank = getRankName(getDB('myTotalScore', 0));
    };

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showPage(p, t) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('title').innerText = t;
        document.getElementById('header-plus').style.visibility = (p === 'timer') ? 'visible' : 'hidden';
        const items = document.querySelectorAll('.menu-item');
        items.forEach(item => { if(item.innerText.includes(t)) item.classList.add('active'); });
        toggleMenu();
        if(p === 'timer') { scrollToNow(); renderBlocks(); }
        renderAll();
    }

    // 進化 & エフェクト
    function getRankName(score) {
        if(score >= 1000) return "🎂";
        if(score >= 500) return "🍖";
        if(score >= 300) return "🍱";
        if(score >= 150) return "🍛";
        if(score >= 50) return "🍳";
        return "🥚";
    }

    function createSprinkles() {
        for(let i=0; i<20; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.innerText = sprinkleIcons[Math.floor(Math.random()*sprinkleIcons.length)];
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = "-20px";
            s.style.fontSize = (Math.random() * 20 + 20) + "px";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1500);
        }
    }

    function updateChar() {
        const score = getDB('myTotalScore', 0);
        const emoji = getRankName(score);
        const rankNames = {"🎂":"豪華ケーキ","🍖":"マンガ肉","🍱":"特上お弁当","🍛":"カレーライス","🍳":"目玉焼き","🥚":"生たまご"};
        
        if(emoji !== lastRank) {
            createSprinkles(); // ランクアップエフェクト！
            lastRank = emoji;
        }

        document.getElementById('char-emoji').innerText = emoji;
        document.getElementById('rank-display').innerText = "メニュー: " + rankNames[emoji];
        document.getElementById('score-display').innerText = score + " pt";
    }

    function petChar() {
        const char = document.getElementById('room-char');
        const face = document.getElementById('char-face');
        char.style.transform = "scale(1.2) rotate(5deg)";
        setTimeout(() => char.style.transform = "scale(1.0) rotate(0deg)", 200);
        face.innerText = "❤️";
        document.getElementById('talk-bubble').innerText = "おいしい！もっと頑張るね！";
        setTimeout(() => { face.innerText = faces[Math.floor(Math.random()*faces.length)]; }, 1000);
    }

    // 献立ログ
    function addMealLog(title) {
        const logs = getDB('mealLogs', []);
        const now = new Date();
        logs.unshift({ title, time: now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0') });
        setDB('mealLogs', logs.slice(0, 5)); // 直近5件
        renderLogs();
    }

    function renderLogs() {
        const logs = getDB('mealLogs', []);
        document.getElementById('meal-log').innerHTML = logs.length ? 
            logs.map(l => `<div class="log-item">🍽 ${l.time} - ${l.title} を完食！</div>`).join('') :
            "<div style='font-size:0.8rem; color:#ccc;'>まだ完食したメニューはありません</div>";
    }

    // --- 各種機能（維持！） ---
    function openPlanModal() { document.getElementById('plan-modal').style.display = 'flex'; }
    function closePlanModal() { document.getElementById('plan-modal').style.display = 'none'; }
    function savePlan() {
        const title = document.getElementById('p-name').value;
        const start = parseInt(document.getElementById('p-start').value);
        const end = parseInt(document.getElementById('p-end').value);
        if(!title || isNaN(start)) return;
        const plans = getDB('fixedPlans', []);
        plans.push({title, start: start*60, end: (end||start+1)*60, color: document.getElementById('p-color').value});
        setDB('fixedPlans', plans); renderBlocks(); closePlanModal();
    }

    function initTimeline() {
        const wrapper = document.getElementById('timeline-wrapper');
        wrapper.querySelectorAll('.time-row').forEach(r => r.remove());
        for(let i=0; i<24; i++) {
            const row = document.createElement('div');
            row.className = 'time-row';
            row.innerHTML = `<div class="time-label">${i}:00</div><div style="flex:1; border-left:3px solid #ffe0b2;"></div>`;
            wrapper.appendChild(row);
        }
    }

    function renderBlocks() {
        const plans = getDB('fixedPlans', []);
        document.getElementById('plan-container').innerHTML = plans.map(p => 
            `<div class="plan-block" style="top:${p.start}px; height:${(p.end-p.start)}px; background:${p.color};">${p.title}</div>`
        ).join('');
        const slots = getDB('studySlots', []);
        document.getElementById('block-container').innerHTML = slots.map(s => 
            `<div class="study-block" style="top:${s.start}px; height:${(s.end-s.start)}px; background:var(--study-orange);">${s.title}</div>`
        ).join('');
    }

    function updateTimeBar() {
        const now = new Date();
        const bar = document.getElementById('current-bar');
        if(bar) bar.style.top = (now.getHours() * 60 + now.getMinutes()) + "px";
    }

    function scrollToNow() { document.getElementById('timer').scrollTop = (new Date().getHours() * 60) - 100; }

    function addTodo() {
        const title = document.getElementById('todo-input').value;
        const time = parseInt(document.getElementById('todo-time').value) || 30;
        if(!title) return;
        const todos = getDB('myTodos', []);
        todos.push({title, time}); setDB('myTodos', todos);
        document.getElementById('todo-input').value = ''; document.getElementById('todo-time').value = '';
        renderTodos();
    }

    function renderTodos() {
        const todos = getDB('myTodos', []);
        document.getElementById('todo-list').innerHTML = todos.map((t, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span><strong>${t.title}</strong> (${t.time}分)</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-green" onclick="startFocus(${i})">味見</button>
                    <button class="btn-red" onclick="deleteTodo(${i})">完食！</button>
                </div>
            </div>
        `).join('');
    }

    function startFocus(i) {
        const task = getDB('myTodos', [])[i];
        const now = new Date();
        const start = now.getHours() * 60 + now.getMinutes();
        const slots = getDB('studySlots', []);
        slots.push({start, end: start + task.time, title: task.title});
        setDB('studySlots', slots); renderBlocks();
    }

    function deleteTodo(i) {
        const todos = getDB('myTodos', []);
        addMealLog(todos[i].title);
        todos.splice(i, 1);
        setDB('myTodos', todos); renderTodos(); renderLogs();
    }

    function addNewHabit() {
        const val = document.getElementById('habit-name-input').value; if(!val) return;
        const h = getDB('myHabitList', ["勉強", "運動"]); h.push(val);
        setDB('myHabitList', h); document.getElementById('habit-name-input').value = ''; renderHabits();
    }

    function renderHabits() {
        const h = getDB('myHabitList', ["勉強", "運動"]);
        document.getElementById('habit-list').innerHTML = h.map((name, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span><strong>${name}</strong></span>
                <div style="display:flex; gap:6px;">
                    <button class="btn-green" onclick="updateScore(10)">おかわり</button>
                    <button class="btn-red" onclick="updateScore(-10)">残す</button>
                </div>
            </div>
        `).join('');
    }

    function updateScore(p) {
        let s = getDB('myTotalScore', 0); s += p; if(s < 0) s = 0;
        setDB('myTotalScore', s); updateChar();
    }

    function addBook() {
        const title = document.getElementById('bk-title').value; if(!title) return;
        const b = getDB('myBooks', []);
        b.push({ title, author: document.getElementById('bk-author').value, pub: document.getElementById('bk-pub').value, year: document.getElementById('bk-year').value, genre: document.getElementById('bk-genre').value, added: new Date().toLocaleDateString() });
        setDB('myBooks', b); renderBooks();
    }

    function renderBooks() {
        const b = getDB('myBooks', []);
        document.getElementById('year-books').innerText = b.length;
        const g = {}; b.forEach(x => g[x.genre] = (g[x.genre] || 0) + 1);
        document.getElementById('genre-stats').innerText = "コース内訳: " + Object.entries(g).map(([k,v]) => `${k}(${v})`).join(', ');
        document.getElementById('book-list').innerHTML = b.map((x, i) => `
            <div class="card" onclick="alert('作者: ${x.author}\\n発行所: ${x.pub}\\n年: ${x.year}\\n登録: ${x.added}')">
                <strong>${x.title}</strong><br><small>${x.author} / ${x.genre}</small>
            </div>
        `).join('');
    }

    function clearAllSchedules() { if(confirm("リセットする？")) { setDB('fixedPlans', []); setDB('studySlots', []); renderBlocks(); } }

    function renderAll() {
        renderTodos(); renderHabits(); renderBooks(); updateChar(); renderLogs();
        document.getElementById('meigen-area').innerText = foodMeigens[Math.floor(Math.random()*foodMeigens.length)];
    }
</script>

</body>
</html>
